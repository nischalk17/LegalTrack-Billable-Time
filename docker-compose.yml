version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: billable_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-billable}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-billable_pass}
      POSTGRES_DB: ${POSTGRES_DB:-billable_tracker}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-billable} -d ${POSTGRES_DB:-billable_tracker}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: billable_backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-billable}:${POSTGRES_PASSWORD:-billable_pass}@db:5432/${POSTGRES_DB:-billable_tracker}
      JWT_SECRET: ${JWT_SECRET:-supersecretjwtkey_changeme_in_production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: billable_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    depends_on:
      - backend

volumes:
  postgres_data:
