<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LegalTrack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #0d1117;
        --surface: #0f1621;
        --border: rgba(255,255,255,0.08);
        --text: rgba(255,255,255,0.92);
        --muted: rgba(255,255,255,0.62);
        --danger: #f85149;
        --accent: #1f6feb;
        --accent-2: #79c0ff;
        --input: rgba(255,255,255,0.06);
        --shadow: 0 16px 48px rgba(0,0,0,0.5);
      }

      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        font-family: "IBM Plex Sans", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        background: radial-gradient(1000px 400px at 50% -30%, rgba(31,111,235,0.25), transparent 60%),
                    radial-gradient(700px 300px at 100% 0%, rgba(121,192,255,0.18), transparent 60%),
                    var(--bg);
        color: var(--text);
        display: grid;
        place-items: center;
      }

      .window {
        width: 340px;
        border: 1px solid var(--border);
        background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.02));
        box-shadow: var(--shadow);
        border-radius: 14px;
        overflow: hidden;
      }

      .titlebar {
        -webkit-app-region: drag;
        height: 40px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 10px 0 12px;
        border-bottom: 1px solid var(--border);
        background: rgba(0,0,0,0.12);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 8px;
        font-weight: 600;
      }

      /* No window controls (frameless window). */

      .content {
        padding: 18px 18px 16px;
      }

      h1 {
        margin: 12px 0 6px;
        font-size: 18px;
        font-weight: 600;
      }
      .subtitle {
        margin: 0 0 16px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.4;
      }

      label {
        display: block;
        font-size: 12px;
        color: var(--muted);
        margin: 12px 0 6px;
      }

      input {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 12px;
        background: var(--input);
        color: var(--text);
        outline: none;
        font-size: 13px;
      }
      input:focus {
        border-color: rgba(31,111,235,0.55);
        box-shadow: 0 0 0 3px rgba(31,111,235,0.18);
      }

      .button {
        margin-top: 14px;
        width: 100%;
        height: 38px;
        border: 1px solid rgba(31,111,235,0.45);
        border-radius: 10px;
        background: linear-gradient(180deg, rgba(31,111,235,0.95), rgba(31,111,235,0.82));
        color: white;
        font-weight: 600;
        cursor: pointer;
        font-size: 13px;
      }
      .button:disabled {
        opacity: 0.65;
        cursor: not-allowed;
      }

      .error {
        margin-top: 10px;
        color: var(--danger);
        font-size: 12px;
        min-height: 16px;
      }

      .status {
        margin-top: 10px;
        color: var(--muted);
        font-size: 12px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: rgba(121,192,255,0.95);
        box-shadow: 0 0 0 4px rgba(121,192,255,0.12);
        animation: pulse 1.4s infinite;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(0.9); opacity: 0.7; }
      }

      .footer {
        padding: 12px 18px 16px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        color: rgba(255,255,255,0.45);
        font-size: 12px;
        border-top: 1px solid var(--border);
        background: rgba(0,0,0,0.10);
      }

      .version { color: rgba(255,255,255,0.45); }
      .hint { color: rgba(255,255,255,0.55); }
      .emoji { font-size: 16px; }
    </style>
  </head>
  <body>
    <div class="window">
      <div class="titlebar">
        <div class="brand">
          <span class="emoji">⚖️</span>
          <span>LegalTrack</span>
        </div>
      </div>

      <div class="content">
        <h1>Automatic billing for<br/>legal professionals</h1>
        <p class="subtitle">Sign in to start tracking your active work and generate clean, billable reports.</p>

        <form id="loginForm">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" autocomplete="username" placeholder="you@firm.com" required />

          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" placeholder="••••••••" required />

          <button class="button" id="signInBtn" type="submit">Sign In</button>
          <div class="error" id="error"></div>

          <div class="status" id="status">
            <span class="dot"></span>
            <span id="statusText">Connecting securely...</span>
          </div>
        </form>
      </div>

      <div class="footer">
        <span class="hint">Secure sign-in</span>
        <span class="version">v1.0.0</span>
      </div>
    </div>

    <script>
      const form = document.getElementById('loginForm');
      const btn = document.getElementById('signInBtn');
      const errorEl = document.getElementById('error');
      const statusText = document.getElementById('statusText');

      function setError(msg) {
        errorEl.textContent = msg || '';
      }

      function setBusy(isBusy) {
        btn.disabled = isBusy;
        btn.textContent = isBusy ? 'Signing in...' : 'Sign In';
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        setError('');
        setBusy(true);
        statusText.textContent = 'Signing in...';

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        try {
          const result = await window.electronAPI.login(email, password);
          if (!result || !result.ok) {
            setError((result && result.error) ? result.error : 'Sign in failed');
            statusText.textContent = 'Connection error';
          }
        } catch (err) {
          setError('Sign in failed');
          statusText.textContent = 'Connection error';
        } finally {
          setBusy(false);
        }
      });

      window.electronAPI.onLoginError((_event, message) => {
        setError(message || 'Sign in failed');
        statusText.textContent = 'Connection error';
        setBusy(false);
      });
    </script>
  </body>
</html>
